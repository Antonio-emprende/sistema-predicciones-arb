<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Predicciones ARB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-size: 20px; background-color: #f8f9fa; }
        .grande { font-size: 22px !important; }
        .card { max-width: 520px; margin: 2rem auto; border-radius: 12px; }
        table { font-size: 18px; }
    </style>
</head>
<body>
    <div class="container py-4">

        <!-- Pantalla de ingreso -->
        <div id="pantallaLogin" class="card shadow p-4">
            <h2 class="text-center text-primary mb-4">Sistema ARB</h2>
            <div class="mb-3">
                <label class="form-label grande">Usuario</label>
                <input type="text" id="campoUsuario" class="form-control grande" placeholder="Ingrese su usuario">
            </div>
            <div class="mb-4">
                <label class="form-label grande">Contraseña</label>
                <input type="password" id="campoClave" class="form-control grande" placeholder="Ingrese su contraseña">
            </div>
            <button onclick="iniciarSesion()" class="btn btn-primary w-100 grande">Ingresar</button>
        </div>

        <!-- Pantalla principal -->
        <div id="pantallaPrincipal" class="d-none">
            <h2 class="text-center text-success mb-4">Reporte de Resultados</h2>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label grande">Fecha desde</label>
                    <input type="date" id="fechaDesde" class="form-control grande">
                </div>
                <div class="col-md-6">
                    <label class="form-label grande">Fecha hasta</label>
                    <input type="date" id="fechaHasta" class="form-control grande">
                </div>
            </div>
            <button onclick="cargarDatos()" class="btn btn-success grande">Ver registros</button>

            <div id="tablaResultados" class="mt-5 table-responsive"></div>
        </div>

    </div>

    <script>
        let idUsuario = 1;

        async function iniciarSesion() {
            const usuario = document.getElementById("campoUsuario").value.trim();
            const clave = document.getElementById("campoClave").value.trim();

            if (!usuario || !clave) {
                alert("Complete ambos campos");
                return;
            }

            const respuesta = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario, clave })
            });

            const datos = await respuesta.json();
            if (datos.ok) {
                idUsuario = datos.id;
                document.getElementById("pantallaLogin").classList.add("d-none");
                document.getElementById("pantallaPrincipal").classList.remove("d-none");
            } else {
                alert(datos.mensaje || "No se pudo ingresar");
            }
        }

        async function cargarDatos() {
            const desde = document.getElementById("fechaDesde").value;
            const hasta = document.getElementById("fechaHasta").value;

            if (!desde || !hasta) {
                alert("Seleccione ambas fechas");
                return;
            }

            const respuesta = await fetch(`/api/ganadores?desde=${desde}&hasta=${hasta}&idpais=${idUsuario}`);
            const registros = await respuesta.json();

            if (registros.error) {
                document.getElementById("tablaResultados").innerHTML = `<div class="alert alert-danger">${registros.error}</div>`;
                return;
            }

            let contenido = `
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Número</th>
                            <th>Predicción</th>
                        </tr>
                    </thead>
                    <tbody>`;

            registros.forEach(fila => {
                contenido += `
                    <tr>
                        <td>${fila.Fecha || "-"}</td>
                        <td>${fila.Hora || "-"}</td>
                        <td>${fila.Numero || "-"}</td>
                        <td>${fila.tira_ranked || "-"}</td>
                    </tr>`;
            });

            contenido += `</tbody></table>`;
            document.getElementById("tablaResultados").innerHTML = contenido;
        }
    </script>
</body>
</html>
