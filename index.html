<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema ARB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #00a293; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .caja { background: white; color: #00a293; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px #0004; width: 320px; }
        .caja h2 { text-align: center; margin-bottom: 20px; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; }
        .campo input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="caja">
        <h2>Sistema ARB</h2>
        <div class="campo">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="Ingrese su usuario">
        </div>
        <div class="campo">
            <label>Contraseña</label>
            <input type="password" id="clave" placeholder="Ingrese su contraseña">
        </div>
        <button onclick="ingresar()">Ingresar</button>
        <div id="mensaje"></div>
    </div>

    <script>
        async function ingresar() {
            const usuario = document.getElementById('usuario').value.trim();
            const clave = document.getElementById('clave').value.trim();
            const mensaje = document.getElementById('mensaje');
            mensaje.textContent = '';

            if (!usuario || !clave) {
                mensaje.textContent = '⚠️ Llene ambos campos';
                mensaje.style.color = 'red';
                return;
            }

            try {
                // ✅ Ruta actualizada para que coincida con el servidor Python
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, clave })
                });

                const datos = await respuesta.json();

                if (datos.ok) {
                    mensaje.textContent = '✅ Acceso correcto';
                    mensaje.style.color = 'green';
                    // ✅ Redirección correcta a la pantalla principal
                    setTimeout(() => {
                        window.location.href = '/principal';
                    }, 800);
                } else {
                    mensaje.textContent = '❌ Usuario o clave incorrectos';
                    mensaje.style.color = 'red';
                }
            } catch (error) {
                console.error(error);
                mensaje.textContent = '❌ Error de conexión';
                mensaje.style.color = 'red';
            }
        }
    </script>
</body>
</html>
